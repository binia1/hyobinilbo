    // ==========================================
    // 리스트 렌더링 및 페이지네이션 로직
    // ==========================================
    const ITEMS_PER_PAGE = 15;
    let currentPage = 1;
    let currentFilteredData = [];

    window.filterList = function(type, btnElement) {
        // 탭 버튼 스타일 활성화
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if(btnElement) btnElement.classList.add('active');

        // 데이터 필터링
        if (type === '전체') {
            currentFilteredData = [...NEWS_DATABASE];
        } else {
            currentFilteredData = NEWS_DATABASE.filter(item => item.type === type);
        }
        
        // 정렬 (가나다 순)
        currentFilteredData.sort((a, b) => a.title.localeCompare(b.title));

        const countInfo = document.getElementById('list-count-info');
        countInfo.textContent = `총 ${currentFilteredData.length}건의 데이터가 있습니다.`;
        
        // 필터 변경 시 첫 페이지로 리셋 후 렌더링
        currentPage = 1;
        renderList();
        renderPagination();
    }

    function renderList() {
        const container = document.getElementById('full-news-list');
        container.innerHTML = '';

        if(currentFilteredData.length === 0) {
            container.innerHTML = '<div class="py-10 text-center text-gray-500">해당 카테고리에 문서가 없습니다.</div>';
            return;
        }

        // 현재 페이지에 해당하는 데이터만 추출 (페이징 슬라이싱)
        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        const pageData = currentFilteredData.slice(startIndex, endIndex);

        pageData.forEach(item => {
            const badgeClass = item.type === '아카이브' ? 'badge-archive' : 
                               item.type === '구분' ? 'badge-category' : 
                               'badge-article';
            
            container.innerHTML += `
                <div class="list-item" onclick="location.href='${item.url}'">
                    <span class="list-badge ${badgeClass}">${item.type}</span>
                    <span class="list-title font-bold">${item.title}</span>
                    <span class="list-url hidden sm:block">${item.url}</span>
                </div>
            `;
        });
    }

    function renderPagination() {
        const container = document.getElementById('pagination-container');
        container.innerHTML = '';

        const totalPages = Math.ceil(currentFilteredData.length / ITEMS_PER_PAGE);
        if (totalPages <= 1) return; // 1페이지 이하면 버튼 숨김

        // 이전 버튼
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerHTML = '&lt;';
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderList();
                renderPagination();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        container.appendChild(prevBtn);

        // 번호 버튼 표시 (현재 페이지를 기준으로 5개까지만 노출)
        const maxPagesToShow = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxPagesToShow / 2));
        let endPage = startPage + maxPagesToShow - 1;

        if (endPage > totalPages) {
            endPage = totalPages;
            startPage = Math.max(1, endPage - maxPagesToShow + 1);
        }

        for (let i = startPage; i <= endPage; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => {
                currentPage = i;
                renderList();
                renderPagination();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            container.appendChild(btn);
        }

        // 다음 버튼
        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerHTML = '&gt;';
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderList();
                renderPagination();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
        container.appendChild(nextBtn);
    }

    // 페이지 로드 시 '전체' 렌더링
    document.addEventListener("DOMContentLoaded", () => {
        const firstBtn = document.querySelector('.filter-btn');
        filterList('전체', firstBtn);
    });

    // ==========================================
    // 2. 검색 엔진 로직 (기존 그대로 유지)
    // ==========================================
    const MAX_RECENT = 8;
    const RECENT_KEY = "hb_news_recent";

    function normKey(s){ return (s||"").toString().trim().toLowerCase(); }

    function loadRecent(){
        try{ return JSON.parse(localStorage.getItem(RECENT_KEY)||"[]") || []; }catch(e){ return []; }
    }
    function saveRecent(list){
        try{ localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0,MAX_RECENT))); }catch(e){}
    }
    function pushRecent(q){
        let qNorm = q.trim();
        if(!qNorm) return;
        const list = loadRecent().filter(x=>normKey(x)!==normKey(qNorm));
        list.unshift(qNorm);
        saveRecent(list);
    }

    function score(item, q){
        const t = normKey(item.title);
        const k = normKey(q);
        const kw = normKey(item.keywords || "");
        if(!k) return 0;
        if(t === k) return 100;
        if(t.startsWith(k)) return 80;
        if(t.includes(k)) return 50;
        if(kw.includes(k)) return 30;
        return 0;
    }

    function ensureDropdown(input){
        const wrap = input.parentElement;
        if(wrap && getComputedStyle(wrap).position === "static") wrap.style.position = "relative";
        let dd = wrap.querySelector(".hn-autocomplete");
        if(!dd){
            dd = document.createElement("div");
            dd.className = "hn-autocomplete absolute left-0 right-0 top-full mt-2 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden z-[9999] max-h-72 overflow-y-auto hidden";
            wrap.appendChild(dd);
        }
        return dd;
    }

    function hide(dd){ if(dd) dd.classList.add("hidden"); }
    function show(dd){ if(dd) dd.classList.remove("hidden"); }

    function row(dd, label, typeStr, cb, isMuted=false){
        const r = document.createElement("button");
        r.type="button";
        r.className = `w-full flex items-center justify-between px-3 py-2 text-sm text-left transition-colors ${isMuted ? 'text-gray-400 cursor-default' : 'text-gray-800 hover:bg-gray-100 cursor-pointer'}`;
        
        let typeBadge = typeStr ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-800 ml-2 whitespace-nowrap">${typeStr}</span>` : '';
        
        r.innerHTML = `<span class="truncate pr-2">${label}</span>${typeBadge}`;
        if(!isMuted) r.addEventListener("click", cb);
        dd.appendChild(r);
    }

    function renderDropdown(dd, input, q){
        dd.innerHTML="";
        const query = q.trim();
        const recent = loadRecent();

        if(!query){
            row(dd, "🕒 최근 검색어", "", null, true);
            if(recent.length===0) row(dd, "검색 이력이 없습니다.", "", null, true);
            else{
                recent.forEach(r=>{
                    row(dd, r, "", ()=>{ input.value=r; doSearch(r); });
                });
                const clear = document.createElement("button");
                clear.className = "w-full text-left px-3 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors";
                clear.textContent = "최근 검색어 지우기";
                clear.addEventListener("click", ()=>{ saveRecent([]); renderDropdown(dd,input,""); });
                dd.appendChild(clear);
            }
            show(dd);
            return;
        }

        const matches = NEWS_DATABASE
            .map(it=>({it, s: score(it, query)}))
            .filter(x=>x.s>0)
            .sort((a,b)=>b.s-a.s || a.it.title.localeCompare(b.it.title))
            .slice(0, 8)
            .map(x=>x.it);

        if(matches.length===0) row(dd,"일치하는 문서가 없습니다", "", null, true);
        else{
            matches.forEach(it=>{
                row(dd, it.title, it.type, ()=>{ pushRecent(query); location.href = it.url; });
            });
        }
        show(dd);
    }

    function showModal(query, items){
        let modal = document.getElementById("hn-search-modal");
        if(!modal){
            modal = document.createElement("div");
            modal.id = "hn-search-modal";
            modal.className = "fixed inset-0 bg-black bg-opacity-50 z-[10000] hidden backdrop-blur-sm";
            modal.innerHTML = `
                <div data-close="1" class="absolute inset-0 cursor-pointer"></div>
                <div class="relative mt-20 mx-auto w-full max-w-3xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
                    <div class="flex items-center justify-between p-4 border-b border-gray-200 bg-gray-50">
                        <div class="font-bold text-lg text-gray-800">통합 검색 결과</div>
                        <button type="button" data-close="1" class="px-3 py-1 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">닫기</button>
                    </div>
                    <div class="p-4 overflow-y-auto flex-1">
                        <div id="hn-search-meta" class="text-sm text-[#0055aa] font-bold mb-3"></div>
                        <div id="hn-search-list" class="flex flex-col gap-2"></div>
                    </div>
                </div>
            `;
            modal.addEventListener("click", (e)=>{
                if(e.target.getAttribute("data-close")==="1") modal.classList.add("hidden");
            });
            document.body.appendChild(modal);
        }
        
        const meta = modal.querySelector("#hn-search-meta");
        const list = modal.querySelector("#hn-search-list");
        meta.textContent = `“${query}” 검색 결과 총 ${items.length}건`;
        list.innerHTML = "";

        if(items.length===0){
            list.innerHTML = `<div class="py-10 text-center text-gray-500">일치하는 문서가 없습니다.</div>`;
        } else {
            items.forEach(it=>{
                const typeColor = it.type === '아카이브' ? 'bg-orange-100 text-orange-800' : 
                                  it.type === '구분' ? 'bg-green-100 text-green-800' : 
                                  'bg-blue-100 text-blue-800';
                
                list.innerHTML += `
                    <a href="${it.url}" class="block p-3 border border-gray-100 rounded-lg hover:shadow-md hover:border-[#0055aa] transition-all bg-white relative group">
                        <div class="font-bold text-gray-900 mb-1 pr-10">${it.title}</div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs px-1.5 py-0.5 rounded font-bold ${typeColor}">${it.type}</span>
                            <span class="text-xs text-gray-400">${it.url}</span>
                        </div>
                    </a>
                `;
            });
        }
        modal.classList.remove("hidden");
    }

    function doSearch(q){
        q = q.trim();
        if(!q) return;
        const matches = NEWS_DATABASE
            .map(it=>({it, s: score(it, q)}))
            .filter(x=>x.s>0)
            .sort((a,b)=>b.s-a.s || a.it.title.localeCompare(b.it.title))
            .map(x=>x.it);

        pushRecent(q);
        showModal(q, matches);
    }

    const input = document.getElementById("hnNewsSearchInput");
    if(input){
        const dd = ensureDropdown(input);
        input.addEventListener("keydown", (e)=>{
            if(e.key==="Enter"){ e.preventDefault(); hide(dd); doSearch(input.value); } 
            else if(e.key==="Escape"){ hide(dd); input.blur(); }
        });
        input.addEventListener("input", ()=>renderDropdown(dd,input,input.value));
        input.addEventListener("focus", ()=>renderDropdown(dd,input,input.value));
        document.addEventListener("click", (e)=>{
            if(input.parentElement && input.parentElement.contains(e.target)) return;
            hide(dd);
        });
        const btn = input.parentElement.querySelector("button");
        if(btn) btn.addEventListener("click", ()=>doSearch(input.value));
    }
})();
</script>

</body>
</html>
