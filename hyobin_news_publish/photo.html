<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 파이썬이 기사 제목을 꽂아줄 자리 -->
    <title>photo.html - 효빈일보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f7fa; color: #333; }
        
        .news-header { border-bottom: 1px solid #e2e2e2; background: white; }
        .news-nav a { color: #333; font-weight: bold; padding: 0 12px; font-size: 15px; text-decoration: none; }
        .news-nav a:hover { color: #0055aa; text-decoration: underline; }
        .news-nav .active { color: #0055aa; }

        .article-container { max-width: 1080px; margin: 20px auto; display: flex; gap: 40px; }
        .main-content { flex: 3; background: white; padding: 40px; border: 1px solid #e2e2e2; border-radius: 4px; }
        .side-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .article-title { font-size: 34px; font-weight: bold; line-height: 1.3; color: #111; margin-bottom: 10px; letter-spacing: -1px; }
        .article-info { font-size: 13px; color: #888; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .article-body { font-size: 17px; line-height: 1.8; color: #222; font-family: 'Nanum Myeongjo', serif; } 
        .article-body strong { font-weight: 800; background: linear-gradient(to top, #fecaca 50%, transparent 50%); }
        .article-body p { margin-bottom: 24px; text-align: justify; }
        .img-caption { font-size: 13px; color: #666; margin-top: 8px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; font-family: 'Noto Sans KR', sans-serif;}
        .article-body a { color: #0055aa; text-decoration: none; font-weight: bold; font-family: 'Noto Sans KR', sans-serif;}
        .article-body a:hover { text-decoration: underline; }

        .ranking-box { background: white; border: 1px solid #e2e2e2; border-radius: 4px; padding: 20px; }
        .ranking-title { font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .ranking-list li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; display: flex; gap: 10px; cursor: pointer; }
        .ranking-list li:hover .ranking-link { text-decoration: underline; color: #0055aa; }
        .ranking-num { font-weight: bold; color: #0055aa; font-style: italic; width: 20px; }
        .ranking-link { color: #333; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        .comment-section { margin-top: 50px; border-top: 2px solid #333; padding-top: 20px; font-family: 'Noto Sans KR', sans-serif;}
        .comment-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; }
        .comment-write-area { border: 1px solid #ddd; background: #f9f9f9; padding: 15px; }
        .comment-inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        .comment-inputs input { border: 1px solid #ccc; padding: 5px 10px; font-size: 13px; width: 150px; }
        .comment-textarea-box { display: flex; gap: 10px; }
        .comment-list-container { margin-top: 20px; }
        .comment-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .best-comment { background: #f0f7ff; border: 1px solid #cce5ff; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        
        .vote-btn { cursor: pointer; user-select: none; margin-right: 10px; font-size: 12px; color: #666; }
        .vote-btn:hover { color: #0055aa; font-weight: bold; }
        .vote-btn.active { color: #0055aa; font-weight: bold; }
        .vote-btn.active-hate { color: red; font-weight: bold; }

        .reply-toggle { cursor: pointer; font-size: 12px; color: #555; margin-left: 10px; font-weight: bold; }
        .reply-toggle:hover { text-decoration: underline; color: #0055aa; }
        .reply-container { margin-top: 10px; padding-left: 20px; border-left: 2px solid #eee; display: none; }
        .reply-item { margin-bottom: 8px; font-size: 13px; background: #fafafa; padding: 10px; border-radius: 4px; border: 1px solid #eee; }

        .quote-box { background: #f8f9fa; border-left: 5px solid #0055aa; padding: 15px 20px; margin: 20px 0; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; color: #333; line-height: 1.6;}
    </style>
</head>
<body>

    <!-- 헤더 -->
    <div id="common-header"></div>
    
    <div class="article-container">
        <div class="main-content shadow-sm">
            <div id="article-content-area">
                <div class="mb-2 text-[#0055aa] font-bold" style="font-family: 'Noto Sans KR', sans-serif;">효빈일보 뉴스</div>
                
                <!-- 파이썬 렌더링 1: 기사 제목 -->
                <h2 class="article-title">photo.html</h2>
                
                <div class="article-info">
                    <div>
                        <!-- 파이썬 렌더링 2: 기자 이름과 날짜 -->
                        <span class="font-bold">정치부 김기자</span><br>
                        <span class="text-xs text-gray-400">2026.01.29</span>
                    </div>
                    <div class="flex gap-2 text-xs">
                        <button class="border px-2 py-1 rounded hover:bg-gray-100">가</button>
                        <button class="border px-2 py-1 rounded hover:bg-gray-100">가+</button>
                        <button class="border px-2 py-1 rounded hover:bg-gray-100">인쇄</button>
                    </div>
                </div>
                
                <!-- 파이썬 렌더링 3: 기사 본문 (HTML 태그 그대로 꽂아줌) -->
                <div class="article-body">
                    
                </div>
            </div>

            <!-- 댓글창 영역 -->
            <div class="comment-section">
                <div class="comment-header">
                    댓글 <span class="text-[#0055aa]" id="comment-count">0</span>
                </div>
                
                <div class="comment-write-area mb-6">
                    <div class="comment-inputs">
                        <input type="text" id="cmt-nick" placeholder="닉네임">
                        <input type="password" id="cmt-pw" placeholder="비밀번호">
                    </div>
                    <div class="comment-textarea-box">
                        <textarea id="cmt-content" class="w-full h-20 p-2 border border-gray-300 resize-none text-sm" placeholder="타인의 권리를 침해하거나 명예를 훼손하는 댓글은 운영원칙에 따라 제재받을 수 있습니다."></textarea>
                        <button class="bg-[#0055aa] text-white px-6 font-bold text-sm hover:bg-[#004499] transition-colors" onclick="addComment()">등록</button>
                    </div>
                </div>

                <!-- 댓글 목록 -->
                <div class="comment-list-container" id="comment-list">
                    <!-- JavaScript에서 동적 렌더링 -->
                </div>
            </div>
        </div>

        <!-- 사이드바 -->
        <div class="side-content">
            <div id="common-sidebar-ranking"></div>
        </div>
    </div>

    <!-- 댓글 및 상호작용 스크립트 -->
    <script>
        // 파이썬 렌더링 4: 데이터베이스의 댓글 배열을 JS 코드로 통째로 번역해서 꽂아줌!
        let commentsData = [];
        let totalCommentCount = commentsData.length; 

        // 1. 화면에 댓글 목록을 그려주는 함수
        function renderComments() {
            const container = document.getElementById('comment-list');
            container.innerHTML = ""; 

            // 총 댓글 수 업데이트
            document.getElementById('comment-count').innerText = totalCommentCount.toLocaleString();

            commentsData.forEach((cmt, idx) => {
                const div = document.createElement('div');
                div.className = cmt.isPunished ? "best-comment border-red-300 bg-red-50" : (cmt.like > 100 ? "best-comment" : "comment-item");
                
                let repliesHtml = "";
                let replyButtonHtml = "";

                if (cmt.replies && cmt.replies.length > 0) {
                    replyButtonHtml = `<span class="reply-toggle" onclick="toggleReply('reply-${idx}')">답글 ${cmt.replies.length}개 보기 ▼</span>`;
                    repliesHtml = `<div class="reply-container" id="reply-${idx}" ${cmt.isPunished ? 'style="display:block"' : ''}>`;

                    cmt.replies.forEach(reply => {
                        const styleClass = reply.styleClass || "bg-gray-50 border border-gray-200";
                        const nickClass = reply.nickClass || (reply.nick.includes("Yoon") || reply.nick.includes("Ji_") || reply.nick.includes("A_ssi") ? "text-red-600 font-bold" : "text-gray-700 font-bold");

                        repliesHtml += `
                            <div class="reply-item ${styleClass}">
                                <span class="${nickClass}">${reply.nick}</span>: 
                                <span>${reply.content}</span>
                            </div>`;
                    });
                    repliesHtml += `</div>`;
                }

                // 투표 버튼 상태에 따른 클래스 부여
                const likeActive = cmt.userVote === 'like' ? 'active' : '';
                const dislikeActive = cmt.userVote === 'dislike' ? 'active-hate' : '';

                div.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-sm ${cmt.isPunished ? 'text-red-600' : ''}">${cmt.nick} ${cmt.ip ? `(${cmt.ip})` : ''}</span>
                        <span class="text-xs text-gray-500">${cmt.time || '방금 전'}</span>
                    </div>
                    <p class="text-sm mb-2 ${cmt.isPunished ? 'text-red-800 font-bold' : ''}">${cmt.content}</p>
                    <div class="text-xs text-gray-500 mb-2 flex gap-3 items-center">
                        <span class="vote-btn ${likeActive}" onclick="handleVote(${cmt.id || idx}, 'like', this)">공감 <span class="count">${(cmt.like || 0).toLocaleString()}</span></span>
                        <span class="vote-btn ${dislikeActive}" onclick="handleVote(${cmt.id || idx}, 'dislike', this)">비공감 <span class="count">${(cmt.dislike || 0).toLocaleString()}</span></span>
                        ${replyButtonHtml}
                    </div>
                    ${repliesHtml}
                `;
                container.appendChild(div);
            });
        }

        // 2. 새로운 댓글을 등록하는 함수 (오류 완벽 수정)
        function addComment() { 
            const nickInput = document.getElementById('cmt-nick');
            const pwInput = document.getElementById('cmt-pw');
            const contentInput = document.getElementById('cmt-content');

            if(!nickInput.value.trim() || !pwInput.value.trim() || !contentInput.value.trim()) {
                alert("닉네임, 비밀번호, 내용을 모두 입력해주세요.");
                return;
            }

            const newComment = {
                id: Date.now(), // 고유 ID 생성
                nick: nickInput.value,
                time: "방금 전",
                like: 0,
                dislike: 0,
                isPunished: false,
                userVote: null,
                content: contentInput.value.replace(/\n/g, "<br>"), // 줄바꿈 처리
                replies: []
            };

            commentsData.unshift(newComment); // 배열 맨 앞에 추가
            totalCommentCount++; // 전체 댓글 수 증가
            
            // 입력창 초기화
            nickInput.value = '';
            pwInput.value = '';
            contentInput.value = '';

            renderComments(); // 바뀐 데이터를 바탕으로 화면 즉시 갱신 (이제 댓글 바로 보임!)
            alert("댓글이 등록되었습니다."); 
        }

        // 3. 추천/비추천 논리적 제어 (부분 렌더링으로 답글 창 안 닫힘!)
        function handleVote(commentId, voteType, btnElement) {
            // commentId로 찾거나, 없을 경우(더미데이터) index로 매칭
            let cmt = commentsData.find(c => c.id === commentId);
            if(!cmt) cmt = commentsData[commentId]; 
            if(!cmt) return;

            const parentDiv = btnElement.parentElement;
            const likeBtn = parentDiv.children[0];
            const dislikeBtn = parentDiv.children[1];

            if (cmt.userVote === voteType) {
                cmt[voteType]--;
                cmt.userVote = null;
                btnElement.classList.remove(voteType === 'like' ? 'active' : 'active-hate');
            } else {
                if (cmt.userVote) {
                    cmt[cmt.userVote]--;
                    if(cmt.userVote === 'like') likeBtn.classList.remove('active');
                    else dislikeBtn.classList.remove('active-hate');
                }
                cmt[voteType]++;
                cmt.userVote = voteType;
                btnElement.classList.add(voteType === 'like' ? 'active' : 'active-hate');
            }

            // 화면을 다시 그리지 않고 해당 버튼의 숫자만 콕 집어서 변경! (답글창 유지됨)
            likeBtn.querySelector('.count').innerText = cmt.like.toLocaleString();
            dislikeBtn.querySelector('.count').innerText = cmt.dislike.toLocaleString();
        }

        // 4. 답글 열기/닫기 토글
        function toggleReply(id) {
            const el = document.getElementById(id);
            if (el.style.display === 'block') el.style.display = 'none';
            else el.style.display = 'block';
        }

        // 페이지 로드 시 최초 1회 화면 그리기 실행
        renderComments();
    </script>

    <div id="common-footer"></div>
    <!-- 효빈일보 코어 스크립트 -->
    <script src="assets/hb_news_core.js"></script>
</body>
</html>
